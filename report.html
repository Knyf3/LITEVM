<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LITEVM — Visitor Reports">
  <title>LITEVM — Visitor Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 48 48%22><rect x=%2210%22 y=%2218%22 width=%2228%22 height=%2226%22 rx=%222%22 fill=%22%234361ee%22/><path d=%22M6 20L24 6l18 14%22 fill=%22%234361ee%22/></svg>">
</head>
<body>
  <!-- PIN Gate Overlay -->
  <div id="pin-overlay" class="pin-overlay">
    <div class="pin-card">
      <h2>🔒 LITEVM Reports</h2>
      <p>Enter PIN to continue</p>
      <div class="pin-input-row">
        <input type="password" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      </div>
      <p id="pin-error" class="pin-error hidden">Incorrect PIN</p>
    </div>
  </div>

  <!-- Main Content (hidden until PIN verified) -->
  <div id="main-content" class="hidden">
    <div class="header">
      <div class="header-inner">
        <h1>📋 Visitor Reports</h1>
        <div class="header-links">
          <a href="verify.html" class="header-link">🔙 Guard Portal</a>
        </div>
      </div>
    </div>

    <div class="container">
      <!-- Filter Bar Card -->
      <div class="report-filters card">
        <div class="filter-row date-row">
          <div class="date-group">
            <label>From</label>
            <input type="date" id="date-from">
          </div>
          <div class="date-group">
            <label>To</label>
            <input type="date" id="date-to">
          </div>
          <div class="preset-group">
            <button class="preset-btn active" data-preset="today">Today</button>
            <button class="preset-btn" data-preset="yesterday">Yesterday</button>
            <button class="preset-btn" data-preset="7days">7 Days</button>
            <button class="preset-btn" data-preset="month">This Month</button>
          </div>
        </div>
        <div class="filter-row search-row">
          <div class="search-group">
            <input type="text" id="report-search" placeholder="🔍 Search name, company, or visitor number...">
          </div>
          <div class="filter-group">
            <select id="status-filter">
              <option value="">All Statuses</option>
              <option value="Registered">Registered</option>
              <option value="Checked In">Checked In</option>
              <option value="Signed Out">Signed Out</option>
            </select>
          </div>
          <button id="generate-btn" class="btn btn-primary">Generate</button>
          <button id="csv-btn" class="btn btn-secondary" disabled>📥 CSV</button>
          <button id="print-btn" class="btn btn-secondary no-print" onclick="window.print()" disabled>🖨️ Print / PDF</button>
        </div>
      </div>

      <!-- Summary Bar -->
      <div id="summary-bar" class="summary-bar hidden">
        <span id="summary-text">Loading...</span>
      </div>

      <!-- Report Table -->
      <div id="report-table-container" class="report-table-container hidden">
        <table class="report-table" id="report-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Visitor #</th>
              <th>Name</th>
              <th>Company</th>
              <th>Destination</th>
              <th>Date</th>
              <th>Status</th>
              <th>Sign-In</th>
              <th>Sign-Out</th>
            </tr>
          </thead>
          <tbody id="report-tbody"></tbody>
        </table>

        <!-- Mobile card container -->
        <div id="mobile-cards" class="mobile-cards"></div>

        <div id="pagination" class="pagination hidden">
          <button id="prev-page" class="page-btn">← Prev</button>
          <span id="page-info" class="page-info">Page 1 of 1</span>
          <button id="next-page" class="page-btn">Next →</button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <p>No visitors found for this date range.</p>
      </div>

      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading report...</p>
      </div>

      <!-- Error Toast -->
      <div id="error-toast" class="error-toast hidden"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="report.js"></script>
</body>
</html>
