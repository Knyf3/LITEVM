<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LITEVM — Visitor Reports">
  <title data-i18n="title-report">LITEVM — Visitor Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 48 48%22><rect x=%2210%22 y=%2218%22 width=%2228%22 height=%2226%22 rx=%222%22 fill=%22%234361ee%22/><path d=%22M6 20L24 6l18 14%22 fill=%22%234361ee%22/></svg>">
</head>
<body>
  <!-- PIN Gate Overlay -->
  <div id="pin-overlay" class="pin-overlay">
    <div class="pin-card">
      <h2 data-i18n="pin-reports">🔒 LITEVM Reports</h2>
      <p data-i18n="enter-pin-continue">Enter PIN to continue</p>
      <div class="pin-input-row">
        <input type="password" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      </div>
      <p id="pin-error" class="pin-error hidden" data-i18n="incorrect-pin">Incorrect PIN</p>
    </div>
  </div>

  <!-- Main Content (hidden until PIN verified) -->
  <div id="main-content" class="hidden">
    <div class="header header-with-toggle">
      <div class="header-inner">
        <h1 data-i18n="reports">📋 Visitor Reports</h1>
        <div class="header-links">
          <a href="verify.html" class="header-link" data-i18n="nav-guard-portal">🔙 Guard Portal</a>
        </div>
        <button class="lang-toggle" onclick="App.setLang(App._lang === 'en' ? 'id' : 'en')" aria-label="Toggle language">ID</button>
      </div>
    </div>

    <div class="container">
      <!-- Filter Bar Card -->
      <div class="report-filters card">
        <div class="filter-row date-row">
          <div class="date-group">
            <label data-i18n="from">From</label>
            <input type="date" id="date-from">
          </div>
          <div class="date-group">
            <label data-i18n="to">To</label>
            <input type="date" id="date-to">
          </div>
          <div class="preset-group">
            <button class="preset-btn active" data-preset="today" data-i18n="preset-today">Today</button>
            <button class="preset-btn" data-preset="yesterday" data-i18n="preset-yesterday">Yesterday</button>
            <button class="preset-btn" data-preset="7days" data-i18n="preset-7days">7 Days</button>
            <button class="preset-btn" data-preset="month" data-i18n="preset-month">This Month</button>
          </div>
        </div>
        <div class="filter-row search-row">
          <div class="search-group">
            <input type="text" id="report-search" data-i18n-placeholder="placeholder-search-report" placeholder="🔍 Search name, company, or visitor number...">
          </div>
          <div class="filter-group">
            <select id="status-filter">
              <option value="" data-i18n="all-statuses">All Statuses</option>
              <option value="Registered" data-i18n="status-registered">Registered</option>
              <option value="Checked In" data-i18n="status-checked-in">Checked In</option>
              <option value="Signed Out" data-i18n="status-signed-out">Signed Out</option>
            </select>
          </div>
          <button id="generate-btn" class="btn btn-primary"><span data-i18n="btn-generate-report">Generate Report</span></button>
          <button id="csv-btn" class="btn btn-secondary" disabled data-i18n="btn-export-csv">📥 CSV</button>
          <button id="print-btn" class="btn btn-secondary no-print" onclick="window.print()" disabled data-i18n="btn-print-pdf">🖨️ Print / PDF</button>
        </div>
      </div>

      <!-- Summary Bar -->
      <div id="summary-bar" class="summary-bar hidden">
        <span id="summary-text" data-i18n="loading">Loading...</span>
      </div>

      <!-- Report Table -->
      <div id="report-table-container" class="report-table-container hidden">
        <table class="report-table" id="report-table">
          <thead>
            <tr>
              <th data-i18n="table-num">#</th>
              <th data-i18n="table-visitor">Visitor #</th>
              <th data-i18n="table-name">Name</th>
              <th data-i18n="table-company">Company</th>
              <th data-i18n="table-destination">Destination</th>
              <th data-i18n="table-date">Date</th>
              <th data-i18n="table-status">Status</th>
              <th data-i18n="table-sign-in">Sign-In</th>
              <th data-i18n="table-sign-out">Sign-Out</th>
            </tr>
          </thead>
          <tbody id="report-tbody"></tbody>
        </table>

        <!-- Mobile card container -->
        <div id="mobile-cards" class="mobile-cards"></div>

        <div id="pagination" class="pagination hidden">
          <button id="prev-page" class="page-btn" data-i18n="btn-prev">← Prev</button>
          <span id="page-info" class="page-info" data-i18n="page-of">Page 1 of 1</span>
          <button id="next-page" class="page-btn" data-i18n="btn-next">Next →</button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <p data-i18n="no-results">No visitors found for this date range.</p>
      </div>

      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p data-i18n="loading-report">Generating report...</p>
      </div>

      <!-- Error Toast -->
      <div id="error-toast" class="error-toast hidden"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="lang.js?v=1"></script>
  <script src="report.js"></script>
</body>
</html>
